---
- name: Install & configure the misc applications
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Install CLI applications available on DNF
      ansible.builtin.dnf:
        name:
          - bat # cat with color
          - eza # better ls
          - fd-find # newer find
          - fzf # fuzzy finder
          - lazygit # git TUI used by LazyVim
          - neovim # newer Vim
          - ripgrep # better grep
          - zellij # terminal multiplexer - newer tmux
          - wl-clipboard # for wl-copy
          - zoxide # better cd

    - name: Install Discord
      ansible.builtin.dnf:
        name: discord

    - name: Install Signal
      community.general.flatpak:
        name: org.signal.Signal

    - name: Install Kitty (terminal emulator)
      ansible.builtin.dnf:
        name: kitty
