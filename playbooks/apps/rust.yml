---
- name: Configure Rust toolchain
  hosts: all
  become: false
  vars:
    rustup_script: /tmp/rustup-init.sh
    cargo_folder: "{{ ansible_facts['env'].HOME }}/.cargo/bin/"
    rustc_bin: "{{ cargo_folder }}/rustc"
    cargo_bin: "{{ cargo_folder }}/cargo"

  tasks:
    - name: Install gcc (linker required)
      ansible.builtin.dnf:
        name: gcc
      become: true

    - name: Check if Rust is already installed
      ansible.builtin.stat:
        path: "{{ rustc_bin }}"
      register: rust_stat

    - name: Download rustup installer
      ansible.builtin.get_url:
        url: https://sh.rustup.rs
        dest: "{{ rustup_script }}"
        mode: '0755'
      when: not rust_stat.stat.exists

    - name: Run rustup installer (non-interactive)
      ansible.builtin.command: "{{ rustup_script }} -y"
      when: not rust_stat.stat.exists
      changed_when: true

    # Until the shell is restarted, cargo won't be in the $PATH.

    - name: Install rust-analyzer
      ansible.builtin.command:
        cmd: "{{ cargo_folder }}/rustup component add rust-analyzer --toolchain stable"
        creates: "{{ ansible_facts['env'].HOME }}/.rustup/toolchains/stable-x86_64-unknown-linux-gnu/bin/rust-analyzer"

    - name: Install nextest
      community.general.cargo:
        name: cargo-nextest
        executable: "{{ cargo_bin }}"
        locked: true
